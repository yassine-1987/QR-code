<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Information Page</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --bg-color: #f3f4f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover; 
            margin: 0 auto 1rem;
        }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        p { color: #6b7280; margin-bottom: 1.5rem; }
        .info-item {
            display: block;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            background: var(--bg-color);
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .info-item:hover { transform: translateY(-2px); background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.jpg" alt="Your Profile Picture" class="profile-img">
        <h1>Yacine Mhamdi</h1>
        <p>Civil Engineering</p>
        
        <a href="mailto:hello@example.com" class="info-item">Email Me</a>
        <a href="https://linkedin.com" class="info-item">Instagram</a>
        <a href="https://github.com" class="info-item">Github</a>
    </div>
</body>
</html>
